version: '3.8'

services:
  fam-stream:
    image: ghcr.io/guardedgoods/fam-stream:latest
    container_name: movienight
    ports:
      - "8444:3000"
    env_file:
      - .env
    volumes:
      - movienight-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 60s
      timeout: 10s
      retries: 3
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  movienight-data:

# ═══════════════════════════════════════════════════════════════════
# SYNOLOGY NAS DEPLOYMENT
# ═══════════════════════════════════════════════════════════════════
#
# FIRST-TIME SETUP (SSH into your NAS):
#
#   1. Log Docker into your private GitHub Container Registry:
#        docker login ghcr.io -u guardedgoods
#        (paste a GitHub PAT with read:packages scope as the password)
#
#   2. Create the project directory and .env:
#        mkdir -p /volume1/docker/movienight && cd /volume1/docker/movienight
#        # Copy this docker-compose.yml and create .env with:
#          DATABASE_URL=file:/app/data/movienight.db
#          AUTH_SECRET=<openssl rand -base64 32>
#          AUTH_TRUST_HOST=true
#          NEXTAUTH_URL=https://movienight.dukestack.com
#          GOOGLE_CLIENT_ID=your-google-client-id
#          GOOGLE_CLIENT_SECRET=your-google-client-secret
#          TMDB_API_KEY=your-tmdb-api-key
#          OMDB_API_KEY=your-omdb-api-key
#          ADMIN_EMAILS=your-email@gmail.com
#
#   3. Start everything:
#        docker compose up -d
#
# AUTO-UPDATES:
#   Watchtower checks ghcr.io every 5 minutes for new images.
#   When code is pushed to main → GitHub Actions builds a new image →
#   Watchtower detects it → pulls and restarts the container automatically.
#   No manual action needed after initial setup.
#
# MANUAL UPDATE (if needed):
#   docker compose pull && docker compose up -d
# ═══════════════════════════════════════════════════════════════════
