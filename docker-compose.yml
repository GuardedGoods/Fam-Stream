version: '3.8'

services:
  fam-stream:
    image: ghcr.io/guardedgoods/fam-stream:latest
    container_name: movienight
    ports:
      - "8444:3000"
    env_file:
      - .env
    volumes:
      - fam-stream-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  fam-stream-data:

# ═══════════════════════════════════════════════════════════════════
# SYNOLOGY NAS DEPLOYMENT
# ═══════════════════════════════════════════════════════════════════
#
# 1. Open Synology Container Manager
# 2. Go to Project → Create
# 3. Name it "fam-stream"
# 4. Paste this entire file as the docker-compose content
# 5. Create a .env file in the project folder with your API keys:
#      DATABASE_URL=file:/app/data/fam-stream.db
#      AUTH_SECRET=generate-with-openssl-rand-base64-32
#      AUTH_TRUST_HOST=true
#      NEXTAUTH_URL=http://YOUR_SERVER_IP:8444
#      GOOGLE_CLIENT_ID=your-google-client-id
#      GOOGLE_CLIENT_SECRET=your-google-client-secret
#      TMDB_API_KEY=your-tmdb-api-key
#      OMDB_API_KEY=your-omdb-api-key
#      ADMIN_EMAILS=your-email@gmail.com
#      OPENAI_API_KEY=optional
# 6. Click "Build & Start"
# 7. App at http://your-nas-ip:8444
#
# The image is automatically built and published to GitHub
# Container Registry whenever code is pushed to the main branch.
#
# To update to the latest version:
#   Container Manager → Project → fam-stream → Action → Build
#   Or SSH: docker compose pull && docker compose up -d
# ═══════════════════════════════════════════════════════════════════
