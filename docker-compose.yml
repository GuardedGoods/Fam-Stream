services:
  fam-stream:
    image: ghcr.io/guardedgoods/fam-stream:latest
    ports:
      - "8040:3000"
    volumes:
      - fam-stream-data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  fam-stream-data:
